<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact Us - Libaas e Rang</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #f8f9fa;
      color: #333;
    }
    header {
      background-color: #292b2c;
      color: #fff;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header .logo {
      font-size: 1.5em;
      text-decoration: none;
      color: #ffdd00;
    }
    nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
    }
    nav ul li {
      margin-right: 15px;
    }
    nav ul li a {
      text-decoration: none;
      color: #fff;
      font-size: 1em;
    }
    nav ul li a.active {
      color: #ffdd00;
    }
    .hero {
      background-color: #ffdd00;
      text-align: center;
      padding: 50px 20px;
      color: #292b2c;
    }
    .hero h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }
    .content {
      padding: 20px;
      margin: 20px auto;
      max-width: 800px;
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
    }
    .content h2 {
      margin-top: 0;
    }
    .content form input,
    .content form textarea {
      width: 100%;
      padding: 10px;
      margin-bottom: 10px;
      border: 1px solid #ccc;
      border-radius: 5px;
    }
    footer {
      text-align: center;
      padding: 15px;
      background: #292b2c;
      color: #fff;
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="logo">Libaas e Rang</a>
    <nav>
      <ul>
        <li><a href="index.html">Home</a></li>
        <li><a href="faq.html">FAQ</a></li>
        <li><a href="services.html">Services</a></li>
        <li><a href="contact-us.html" class="active">Contact Us</a></li>
        <li><a href="privacy-policy.html">Privacy Policy</a></li>
        <li><a href="shipping-policy.html">Shipping Policy</a></li>
      </ul>
    </nav>
  </header>

  <section class="hero">
    <h1>Contact Us</h1>
    <p>We'd love to hear from you! Get in touch with us for any inquiries or assistance.</p>
  </section>

  <section class="content">
    <h2>Get in Touch</h2>
    <form action="submit-contact-form" method="POST">
      <label for="name">Your Name</label>
      <input type="text" id="name" name="name" required>

      <label for="email">Your Email</label>
      <input type="email" id="email" name="email" required>

      <label for="message">Your Message</label>
      <textarea id="message" name="message" rows="5" required></textarea>

      <button type="submit">Send Message</button>
    </form>
  </section>

  <footer>
    <p>© 2024 Libaas e Rang. All Rights Reserved.</p>
  </footer>
</body>
</html>
