<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Women - Libaas e Rang</title>
   <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 0;
      background-color: #F6D3BD;
      color: #333;
    }
    header {
      background-color: #FFFFFF;
      color: #fff;
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    header .logo {
      font-size: 1.5em;
      text-decoration: none;
      color: #970747;
    }
    nav ul {
      list-style: none;
      margin: 0;
      padding: 0;
      display: flex;
    }
    nav ul li {
      margin-right: 15px;
      position: relative;
    }
    nav ul li a {
      text-decoration: none;
      color: #970747;
      font-size: 1em;
    }
    nav ul li a.active {
      color: #957C3D;
    }
    nav ul li .dropdown-content {
      display: none;
      position: absolute;
      background-color: #fff;
      color: #333;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      padding: 10px 0;
      border-radius: 5px;
      z-index: 1;
      min-width: 120px;
    }
    nav ul li .dropdown-content a {
      color: #333;
      text-decoration: none;
      display: block;
      padding: 10px 15px;
    }
    nav ul li .dropdown-content a:hover {
      background-color: #F6D3BD;
    }
    nav ul li:hover .dropdown-content {
      display: block;
    }
    .hero {
      background-color: #970747;
      text-align: center;
      padding: 50px 20px;
      color: #FFFFFF;
    }
    .hero h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }
    .content {
      padding: 20px;
      margin: 20px auto;
      max-width: 800px;
      background: #F6D3BD;
      border-radius: 10px;
      box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
      text-align: center;
    }
    footer {
      text-align: center;
      padding: 15px;
      background: #970747;
      color: #fff;
    }
/* Styling for the whole content section */
.content {
  padding: 20px;
  max-width: 1200px;
  margin: 0 auto;
}

h3 {
  font-size: 24px;
  color: #333;
  margin-top: 20px;
}

/* Layout for the categories within the content */
.category-section {
  display: flex;
  justify-content: space-around;
  margin-top: 30px;
  flex-wrap: wrap; /* Allows wrapping of items on smaller screens */
}

/* Styling each category block */
.category-item {
  text-align: center;
  width: 250px; /* Adjust as per your design */
  margin-bottom: 20px;
}

/* Image styling */
.category-item img {
  width: 100%;
  height: 80%; /* Adjust as design */
  border-radius: 8px;
  transition: transform 0.3s ease;
}

.category-item img:hover {
  transform: scale(1.05); /* Zoom effect on hover */
}

/* Styling the text below the image */
.category-item h4 {
  font-size: 18px;
  color: #333;
  margin-top: 10px;
}

.category-item a {
  text-decoration: none;
  color: inherit;
}

/* Optional: Responsive Design for smaller screens */
@media (max-width: 768px) {
  .category-section {
    flex-direction: column;
    align-items: center;
  }

  .category-item {
    width: 80%;
  }
}
  </style>

</head>
<body>
  <header>

    </div>

        <div class="category-item">

</section>


  <footer>

  </footer>
</body>
</html>
